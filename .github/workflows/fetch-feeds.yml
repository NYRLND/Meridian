name: Fetch feeds

on:
  schedule:
    - cron: "23 */2 * * *"   # every 2 hours
  workflow_dispatch:          # manual "Run workflow" button
  push:
    paths:
      - "scripts/**"
      - ".github/workflows/fetch-feeds.yml"

permissions:
  contents: write

concurrency:
  group: fetch-feeds
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Build feed.json
        run: python scripts/fetch_feeds.py

      - name: Commit and push if changed
        run: |
          git config user.name "meridian-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/feed.json
          git diff --cached --quiet || git commit -m "chore: refresh feeds"
          git pull --rebase origin main || true
          git push
