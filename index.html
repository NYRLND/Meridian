<!DOCTYPE html>
<html lang="en" data-t="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Meridian</title>
<meta name="description" content="Your personal front page — news that learns what you care about.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#101418">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meridian">
<style>
  :root[data-t="light"]{
    --bg:#F2F4F3; --card:#FFFFFF; --ink:#14181C; --mut:#5B6670;
    --line:#DDE2E1; --accent:#2E7E8C; --chip:#E7ECEB; --soft:#EDF1F0;
    --scrim:rgba(20,24,28,.5);
  }
  :root[data-t="dark"]{
    --bg:#101418; --card:#171C22; --ink:#E8E6E1; --mut:#97A0A8;
    --line:#242B33; --accent:#6FB7C9; --chip:#1F262E; --soft:#1B2129;
    --scrim:rgba(0,0,0,.55);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .serif{font-family:Georgia,"Times New Roman",serif}
  .wrap{max-width:600px; margin:0 auto; padding:0 16px 96px}

  /* Masthead */
  header{display:flex; align-items:flex-end; justify-content:space-between;
    padding-top:calc(18px + env(safe-area-inset-top))}
  .masthead h1{font-family:Georgia,serif; font-style:italic; font-weight:400;
    font-size:27px; margin:0; line-height:1}
  .dateline{font-size:10px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--mut); margin-top:7px}
  .hbtns{display:flex; gap:2px}
  .ibtn{background:none; border:none; padding:10px; color:var(--mut); cursor:pointer;
    border-radius:99px; display:flex; align-items:center; justify-content:center}
  .ibtn svg{width:19px; height:19px}

  /* Tabs */
  nav{display:flex; gap:22px; overflow-x:auto; border-bottom:1px solid var(--line);
    margin:14px -16px 0; padding:0 16px; scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav button{background:none; border:none; padding:2px 0 11px; cursor:pointer;
    font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
    color:var(--mut); white-space:nowrap; border-bottom:2px solid transparent; margin-bottom:-1px}
  nav button.on{color:var(--ink); border-bottom-color:var(--accent)}

  /* Feed meta row */
  .metarow{display:flex; align-items:center; justify-content:space-between; margin:14px 0 12px}
  .updated{font-size:11px; color:var(--mut)}
  .refresh{display:flex; align-items:center; gap:6px; background:none; border:none;
    cursor:pointer; color:var(--accent); font-size:11px; font-weight:600;
    letter-spacing:.12em; text-transform:uppercase; padding:4px 0}
  .refresh svg{width:13px; height:13px}
  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Cards */
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px;
    overflow:hidden; margin-bottom:16px; cursor:pointer; transition:transform .08s}
  .card:active{transform:scale(.99)}
  .art{position:relative; overflow:hidden}
  .art img{display:block; width:100%; height:180px; object-fit:cover}
  .art.duo{height:112px}
  .art .ghost{position:absolute; right:6px; bottom:-36px; font-family:Georgia,serif;
    font-size:108px; line-height:1; color:rgba(255,255,255,.07); user-select:none}
  .art svg.arc{position:absolute; inset:0; width:100%; height:100%}
  .art .srctag{position:absolute; top:11px; left:14px; font-size:9.5px; font-weight:600;
    letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.92);
    text-shadow:0 1px 6px rgba(0,0,0,.55)}
  .cbody{padding:13px 16px 12px}
  .cmeta{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut);
    margin-bottom:7px}
  .chead{font-family:Georgia,serif; font-size:20px; line-height:1.3; margin:0; font-weight:400}
  .csum{font-size:13.5px; line-height:1.55; color:var(--mut); margin:8px 0 0}
  .cfoot{display:flex; align-items:center; justify-content:space-between; margin-top:11px}
  .tags{display:flex; gap:6px; flex-wrap:wrap; min-width:0; padding-right:8px}
  .tag{font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut);
    background:var(--chip); border-radius:99px; padding:3px 9px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; max-width:130px}
  .acts{display:flex; gap:2px; flex-shrink:0}
  .acts .ibtn{padding:8px}
  .acts .ibtn svg{width:16px; height:16px}
  .acts .ibtn.hot{color:var(--accent)}

  /* States */
  .state{text-align:center; padding:56px 24px}
  .state .serif{font-size:19px; margin-bottom:6px}
  .state p{font-size:13.5px; color:var(--mut); margin:0}
  .pill{display:inline-block; margin-top:18px; background:var(--accent); color:#fff;
    border:none; border-radius:99px; padding:11px 22px; font-size:13.5px; font-weight:500;
    cursor:pointer; text-decoration:none}

  /* Travel bar */
  .travelbar{background:var(--soft); border:1px solid var(--line); border-radius:14px;
    padding:14px 15px; margin-top:14px}
  .travelbar .tlabel{font-size:13.5px; font-weight:600; margin-bottom:10px;
    display:flex; align-items:center; gap:7px}
  .travelbar .tlabel svg{width:15px; height:15px; color:var(--accent)}
  .chips{display:flex; gap:8px; flex-wrap:wrap}
  .chips button{background:var(--chip); color:var(--ink); border:1px solid var(--line);
    border-radius:99px; padding:7px 14px; font-size:12px; font-weight:500; cursor:pointer}
  .chips button.on{background:var(--accent); color:#fff; border-color:var(--accent)}

  /* Sheets / overlays */
  .overlay{position:fixed; inset:0; background:var(--scrim); z-index:40;
    display:flex; align-items:flex-end; justify-content:center}
  .overlay.center{align-items:center; padding:0 20px}
  .sheet{background:var(--card); width:100%; max-width:600px; border-radius:22px 22px 0 0;
    max-height:88vh; display:flex; flex-direction:column; overflow:hidden}
  .sheet .scroller{overflow-y:auto; padding:18px 20px calc(26px + env(safe-area-inset-bottom))}
  .sheet .art img{height:150px}
  .xbtn{position:absolute; top:12px; right:12px; background:rgba(0,0,0,.35); color:#fff;
    border:none; border-radius:99px; width:30px; height:30px; cursor:pointer;
    display:flex; align-items:center; justify-content:center}
  .xbtn svg{width:15px; height:15px}
  .shead{font-family:Georgia,serif; font-size:23px; line-height:1.3; margin:0; font-weight:400}
  .ssum{font-size:15px; line-height:1.6; color:var(--mut); margin:12px 0 0}
  .why{display:flex; gap:9px; background:var(--soft); border:1px solid var(--line);
    border-radius:12px; padding:12px 14px; margin-top:15px; align-items:flex-start}
  .why svg{width:14px; height:14px; color:var(--accent); flex-shrink:0; margin-top:2px}
  .why p{font-size:12px; line-height:1.55; color:var(--mut); margin:0}
  .why b{color:var(--ink)}
  .readbtn{display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    background:var(--accent); color:#fff; border:none; border-radius:99px; padding:13px;
    font-size:14px; font-weight:500; margin-top:16px; cursor:pointer; text-decoration:none}
  .readbtn svg{width:15px; height:15px}
  .btnrow{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px}
  .btnrow button{display:flex; align-items:center; justify-content:center; gap:6px;
    background:var(--chip); color:var(--ink); border:none; border-radius:99px;
    padding:11px; font-size:12px; font-weight:500; cursor:pointer}
  .btnrow button svg{width:13px; height:13px}
  .btnrow button.hot{color:var(--accent)}

  /* Settings */
  .settings h3{font-family:Georgia,serif; font-size:20px; font-weight:400; margin:0}
  .setrow{margin-top:22px}
  .setrow .lbl{display:flex; justify-content:space-between; font-size:13.5px;
    font-weight:600; margin-bottom:9px}
  .setrow .lbl span:last-child{color:var(--mut); font-weight:400; font-size:12px}
  input[type=range]{width:100%; accent-color:var(--accent)}
  .rlbl{display:flex; justify-content:space-between; font-size:9.5px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--mut); margin-top:4px}
  .seg{display:flex; background:var(--soft); border:1px solid var(--line);
    border-radius:12px; padding:3px; gap:3px}
  .seg button{flex:1; background:none; border:none; border-radius:9px; padding:9px 0;
    font-size:12.5px; font-weight:500; color:var(--mut); cursor:pointer}
  .seg button.on{background:var(--card); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .dangerbtn{display:flex; align-items:center; gap:8px; width:100%; background:var(--soft);
    border:1px solid var(--line); border-radius:12px; padding:13px 15px; font-size:13.5px;
    font-weight:500; color:var(--ink); cursor:pointer; margin-top:22px}
  .dangerbtn svg{width:15px; height:15px; color:var(--mut)}
  .finenote{font-size:11px; line-height:1.6; color:var(--mut); margin-top:20px}

  /* Toast */
  .toast{position:fixed; bottom:calc(26px + env(safe-area-inset-bottom)); left:50%;
    transform:translateX(-50%); z-index:60; background:var(--ink); color:var(--bg);
    border-radius:99px; padding:10px 18px; font-size:13px; box-shadow:0 4px 18px rgba(0,0,0,.3);
    animation:pop .18s ease-out}
  @keyframes pop{from{opacity:0; transform:translate(-50%,8px)}to{opacity:1; transform:translate(-50%,0)}}

  .skel{border-radius:18px; border:1px solid var(--line); background:var(--card);
    overflow:hidden; margin-bottom:16px}
  .skel .b{background:var(--soft); animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="masthead">
      <h1>Meridian</h1>
      <div class="dateline" id="dateline"></div>
    </div>
    <div class="hbtns">
      <button class="ibtn" id="themeBtn" aria-label="Theme"></button>
      <button class="ibtn" id="settingsBtn" aria-label="Settings"></button>
    </div>
  </header>
  <nav id="tabs"></nav>
  <main id="main"></main>
</div>

<div id="layer"></div>
<div id="toastHost"></div>

<script>
"use strict";

/* ---------------- icons (inline SVG) ---------------- */
var I = {
  sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  auto:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 22h8M12 18v4"/></svg>',
  gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h0a1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>',
  heart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.8 0-3 .5-4.5 2-1.5-1.5-2.7-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4 3 5.5l7 7z"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
  bookF:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
  eyeoff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.9 17.9A10 10 0 0 1 12 20C5 20 1 12 1 12a18 18 0 0 1 5.1-5.9M9.9 4.2A9 9 0 0 1 12 4c7 0 11 8 11 8a18 18 0 0 1-2.2 3.2M14.1 14.1a3 3 0 1 1-4.2-4.2"/><path d="M1 1l22 22"/></svg>',
  ext:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0 0 20.5 15"/></svg>',
  pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'
};

/* ---------------- constants ---------------- */
var TABS = [
  {id:"foryou", label:"For You"},
  {id:"tech", label:"Tech & AI"},
  {id:"world", label:"World"},
  {id:"avl", label:"Asheville"},
  {id:"travel", label:"Travel"},
  {id:"saved", label:"Saved"}
];
var DUOS = [["#16323A","#0B1418"],["#3A2A1C","#141008"],["#232A44","#0D1020"],
            ["#2E3A22","#10140A"],["#41222E","#160B10"],["#1F3630","#0A120F"]];
var CITIES = [
  {name:"Bergen", cc:"no"},{name:"Balestrand", cc:"no"},{name:"Lofthus", cc:"no"},
  {name:"Oslo", cc:"no"},{name:"Drøbak", cc:"no"},{name:"Copenhagen", cc:"dk"}
];
var STOP = {"the":1,"and":1,"for":1,"with":1,"from":1,"that":1,"this":1,"what":1,"when":1,
  "will":1,"after":1,"about":1,"into":1,"over":1,"more":1,"than":1,"they":1,"their":1,
  "have":1,"says":1,"said":1,"could":1,"would":1,"amid":1,"were":1,"been":1,"your":1,"how":1};

/* ---------------- storage ---------------- */
function sget(k, d){ try{ var v = localStorage.getItem("mrd."+k); return v==null ? d : JSON.parse(v); }catch(e){ return d; } }
function sset(k, v){ try{ localStorage.setItem("mrd."+k, JSON.stringify(v)); }catch(e){} }

/* ---------------- state ---------------- */
var state = {
  tab: sget("tab","foryou"),
  feed: null,          // parsed feed.json
  profile: sget("profile", {topics:{}, lastDecay: Date.now()}),
  saved: sget("saved", []),
  settings: sget("settings", {serendipity:35, themeMode:"auto", city:null}),
  loading: true,
  loadError: null,
  scored: {}           // cache of scored/ordered ids per tab per feed load
};

/* interest decay: 5%/day */
(function(){
  var days = Math.floor((Date.now() - (state.profile.lastDecay||Date.now())) / 86400000);
  if(days >= 1){
    var f = Math.pow(0.95, days), t = {};
    for(var k in state.profile.topics){
      var nv = state.profile.topics[k]*f;
      if(Math.abs(nv) > 0.2) t[k] = nv;
    }
    state.profile = {topics:t, lastDecay: Date.now()};
    sset("profile", state.profile);
  }
})();

/* ---------------- utils ---------------- */
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
  .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function hash(s){ var h=0; for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return Math.abs(h); }
function rel(ts){
  var m = Math.round((Date.now()/1000 - ts)/60);
  if(m < 1) return "just now";
  if(m < 60) return m+"m ago";
  var h = Math.round(m/60);
  if(h < 24) return h+"h ago";
  return Math.round(h/24)+"d ago";
}
function relIso(iso){
  if(!iso) return "";
  var t = new Date(iso).getTime();
  if(isNaN(t)) return "";
  return rel(t/1000);
}
function learnKeys(st){
  var keys = (st.t||[]).slice(0,3);
  var words = st.h.toLowerCase().replace(/[^a-z0-9\s\-]/g," ").split(/\s+/);
  for(var i=0;i<words.length && keys.length<5;i++){
    var w = words[i];
    if(w.length>4 && !STOP[w] && keys.indexOf(w)<0) keys.push(w);
  }
  return keys;
}
function toast(msg){
  var host = document.getElementById("toastHost");
  host.innerHTML = '<div class="toast">'+esc(msg)+'</div>';
  clearTimeout(toast._t);
  toast._t = setTimeout(function(){ host.innerHTML=""; }, 2200);
}

/* ---------------- theming ---------------- */
var mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
function applyTheme(){
  var m = state.settings.themeMode;
  var dark = m==="dark" || (m==="auto" && (!mq || mq.matches));
  document.documentElement.setAttribute("data-t", dark ? "dark" : "light");
  var tc = document.querySelector('meta[name="theme-color"]');
  if(tc) tc.setAttribute("content", dark ? "#101418" : "#F2F4F3");
  var btn = document.getElementById("themeBtn");
  btn.innerHTML = m==="auto" ? I.auto : (m==="light" ? I.sun : I.moon);
}
if(mq){
  var mqfn = function(){ if(state.settings.themeMode==="auto") applyTheme(); };
  mq.addEventListener ? mq.addEventListener("change", mqfn) : mq.addListener(mqfn);
}
document.getElementById("themeBtn").onclick = function(){
  var order = ["auto","light","dark"];
  state.settings.themeMode = order[(order.indexOf(state.settings.themeMode)+1)%3];
  sset("settings", state.settings);
  applyTheme();
  toast("Theme: "+state.settings.themeMode);
};

/* ---------------- feed loading ---------------- */
function loadFeed(showSpin){
  state.loading = true; state.loadError = null;
  if(showSpin) render();
  fetch("data/feed.json?t="+Math.floor(Date.now()/60000))
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(j){
      state.feed = j; state.loading = false; state.scored = {}; render();
    })
    .catch(function(e){
      state.loading = false;
      if(!state.feed) state.loadError = "Couldn't load stories. If this repo was just set up, the first feed build may still be running — try again in a minute.";
      render();
      if(state.feed) toast("Refresh failed — showing cached stories");
    });
}

/* ---------------- scoring & personalization ---------------- */
function scoreStory(st, ser){
  var hrs = (Date.now()/1000 - st.ts)/3600;
  var s = Math.max(0, 48-hrs)/48 * 3;
  var hay = (st.h+" "+(st.t||[]).join(" ")).toLowerCase();
  var matched = [];
  var topics = state.profile.topics;
  for(var k in topics){
    var w = topics[k];
    if(hay.indexOf(k) >= 0){
      if(w <= -3) return {score:-999, matched:[], jitter:0};
      s += Math.max(-2, Math.min(3, w*0.6));
      if(w > 0.8) matched.push(k);
    }
  }
  if(/new york times|nyt/i.test(st.s)) s += 0.3;
  var jitter = Math.random()*2*(ser/100);
  s += jitter;
  return {score:s, matched:matched, jitter:jitter};
}

function whyFor(st, meta){
  if(meta && meta.matched && meta.matched.length)
    return "Matches your interest in "+meta.matched.slice(0,2).join(", ")+".";
  if(meta && meta.jitter > 1.2)
    return "A serendipity pick from outside your usual lanes.";
  if(/new york times|nyt/i.test(st.s))
    return "Front-page pick from The New York Times.";
  return "One of the bigger stories in this feed right now.";
}

function poolFor(tab){
  var sec = state.feed ? state.feed.sections || {} : {};
  var cc = cityCC();
  if(tab === "tech") return (sec.tech||[]).slice();
  if(tab === "world") return (sec.world||[]).slice();
  if(tab === "avl") return (sec.avl||[]).slice();
  if(tab === "travel") return cc ? (sec["travel_"+cc]||[]).slice() : [];
  /* for you: blend everything */
  var pool = [].concat(sec.top||[], sec.tech||[], sec.world||[], sec.avl||[]);
  if(cc) pool = pool.concat((sec["travel_"+cc]||[]).slice(0,6));
  return pool;
}

function storiesFor(tab){
  if(tab === "saved") return state.saved;
  if(!state.feed) return [];
  if(state.scored[tab]) return state.scored[tab];
  var ser = state.settings.serendipity;
  var pool = poolFor(tab);
  var seen = {}, hiddenApplied = [];
  var rows = [];
  for(var i=0;i<pool.length;i++){
    var st = pool[i];
    if(seen[st.id]) continue;
    seen[st.id] = 1;
    var meta = scoreStory(st, ser);
    if(meta.score === -999) continue;
    rows.push({st:st, meta:meta});
  }
  rows.sort(function(a,b){ return b.meta.score - a.meta.score; });
  /* keep variety: max 3 per source on For You */
  var out = [], perSrc = {};
  var cap = (tab === "foryou") ? 3 : 99;
  var limit = (tab === "foryou") ? 14 : 28;
  for(var j=0;j<rows.length && out.length<limit;j++){
    var src = rows[j].st.s;
    perSrc[src] = (perSrc[src]||0)+1;
    if(perSrc[src] > cap) continue;
    rows[j].st._why = whyFor(rows[j].st, rows[j].meta);
    out.push(rows[j].st);
  }
  state.scored[tab] = out;
  return out;
}

/* ---------------- travel ---------------- */
function cityCC(){
  var c = state.settings.city;
  if(!c) return null;
  for(var i=0;i<CITIES.length;i++) if(CITIES[i].name===c) return CITIES[i].cc;
  return "no";
}
function setCity(name){
  state.settings.city = name;
  sset("settings", state.settings);
  state.scored = {};
  render();
  toast("Local stories: "+name);
}

/* ---------------- learning actions ---------------- */
function bump(st, delta){
  var keys = learnKeys(st);
  for(var i=0;i<keys.length;i++){
    var k = keys[i];
    state.profile.topics[k] = Math.max(-5, Math.min(10, (state.profile.topics[k]||0)+delta));
  }
  sset("profile", state.profile);
}
function findStory(id){
  var s;
  var tabs = ["foryou","tech","world","avl","travel"];
  for(var i=0;i<tabs.length;i++){
    var list = state.scored[tabs[i]] || [];
    for(var j=0;j<list.length;j++) if(list[j].id===id) return list[j];
  }
  for(var k=0;k<state.saved.length;k++) if(state.saved[k].id===id) return state.saved[k];
  if(state.feed){
    for(var sec in state.feed.sections){
      var arr = state.feed.sections[sec];
      for(var m=0;m<arr.length;m++) if(arr[m].id===id) return arr[m];
    }
  }
  return null;
}
function actMore(id){ var st=findStory(id); if(!st) return; bump(st, 2); toast("Noted — more like this"); }
function actLess(id, closeSheet){
  var st=findStory(id); if(!st) return;
  bump(st, -3);
  for(var t in state.scored){
    state.scored[t] = state.scored[t].filter(function(x){ return x.id!==id; });
  }
  if(closeSheet) closeLayer();
  render();
  toast("Got it — less of that");
}
function actSave(id){
  var st=findStory(id); if(!st) return;
  var idx = -1;
  for(var i=0;i<state.saved.length;i++) if(state.saved[i].u===st.u) idx=i;
  if(idx >= 0){ state.saved.splice(idx,1); toast("Removed from Saved"); }
  else { state.saved.unshift(st); bump(st, 1.5); toast("Saved for later"); }
  sset("saved", state.saved);
  render();
  var hb = document.getElementById("sheetSave");
  if(hb) hb.className = "hot" === "" ? "" : hb.className; /* sheet re-renders below */
  if(document.getElementById("layer").innerHTML && currentSheetId===id) openSheet(id);
}
function actRead(id){ var st=findStory(id); if(st) bump(st, 1); }
function isSaved(st){
  for(var i=0;i<state.saved.length;i++) if(state.saved[i].u===st.u) return true;
  return false;
}

/* ---------------- rendering ---------------- */
function duoHtml(st){
  var g = DUOS[hash(st.h)%DUOS.length];
  return '<div class="art duo" style="background:linear-gradient(135deg,'+g[0]+','+g[1]+')">'
    +'<svg class="arc" viewBox="0 0 400 128" preserveAspectRatio="none">'
    +'<path d="M0,112 Q200,18 400,98" stroke="rgba(255,255,255,0.14)" stroke-width="1" fill="none"/>'
    +'<path d="M0,124 Q200,54 400,116" stroke="rgba(255,255,255,0.07)" stroke-width="1" fill="none"/></svg>'
    +'<span class="srctag">'+esc(st.s)+'</span>'
    +'<span class="ghost">'+esc(st.s.charAt(0))+'</span></div>';
}
function imgFail(imgEl, id){
  var st = findStory(id);
  if(st && imgEl.parentNode){ imgEl.parentNode.outerHTML = duoHtml(st); }
}
function artHtml(st){
  if(st.img){
    return '<div class="art"><img src="'+esc(st.img)+'" alt="" loading="lazy" '
      + 'onerror="imgFail(this,\''+st.id+'\')"></div>';
  }
  return duoHtml(st);
}
function cardHtml(st){
  var sv = isSaved(st);
  return '<div class="card" onclick="openSheet(\''+st.id+'\')">'
    + artHtml(st)
    + '<div class="cbody">'
    + '<div class="cmeta">'+esc(st.s)+' &middot; '+rel(st.ts)+'</div>'
    + '<h2 class="chead serif">'+esc(st.h)+'</h2>'
    + (st.y ? '<p class="csum">'+esc(st.y)+'</p>' : '')
    + '<div class="cfoot">'
    +   '<div class="tags">'+(st.t||[]).slice(0,2).map(function(t){ return '<span class="tag">'+esc(t)+'</span>'; }).join('')+'</div>'
    +   '<div class="acts">'
    +     '<button class="ibtn" aria-label="More like this" onclick="event.stopPropagation();actMore(\''+st.id+'\')">'+I.heart+'</button>'
    +     '<button class="ibtn'+(sv?' hot':'')+'" aria-label="Save" onclick="event.stopPropagation();actSave(\''+st.id+'\')">'+(sv?I.bookF:I.book)+'</button>'
    +     '<button class="ibtn" aria-label="Less like this" onclick="event.stopPropagation();actLess(\''+st.id+'\',false)">'+I.eyeoff+'</button>'
    +     '<a class="ibtn" aria-label="Read at source" href="'+esc(st.u)+'" target="_blank" rel="noopener" onclick="event.stopPropagation();actRead(\''+st.id+'\')">'+I.ext+'</a>'
    +   '</div>'
    + '</div></div></div>';
}
function skeletons(){
  var one = '<div class="skel"><div class="b" style="height:112px"></div>'
    +'<div style="padding:16px"><div class="b" style="height:18px;width:80%;border-radius:6px;margin-bottom:9px"></div>'
    +'<div class="b" style="height:11px;width:100%;border-radius:6px;margin-bottom:6px"></div>'
    +'<div class="b" style="height:11px;width:62%;border-radius:6px"></div></div></div>';
  return one+one+one;
}
function travelBarHtml(){
  var c = state.settings.city;
  var chips = CITIES.map(function(ct){
    return '<button class="'+(c===ct.name?'on':'')+'" onclick="setCity(\''+ct.name+'\')">'+esc(ct.name)+'</button>';
  }).join('');
  return '<div class="travelbar">'
    + '<div class="tlabel">'+I.pin+'<span>'+(c ? esc(c) : 'Where are you on the trip?')+'</span></div>'
    + '<div class="chips">'+chips+'</div></div>';
}
function render(){
  document.getElementById("dateline").textContent =
    new Date().toLocaleDateString(undefined, {weekday:"long", month:"long", day:"numeric"});
  /* tabs */
  document.getElementById("tabs").innerHTML = TABS.map(function(t){
    return '<button class="'+(state.tab===t.id?'on':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>';
  }).join('');
  var m = document.getElementById("main");
  var tab = state.tab;

  if(tab === "saved"){
    if(!state.saved.length){
      m.innerHTML = '<div class="state"><div class="serif">Nothing saved yet</div><p>Tap the bookmark on any story to keep it here.</p></div>';
    } else {
      m.innerHTML = '<div class="metarow"><span class="updated">'+state.saved.length+' saved</span></div>'
        + state.saved.map(cardHtml).join('');
    }
    return;
  }

  var head = '';
  if(tab === "travel") head += travelBarHtml();
  if(tab !== "travel" || state.settings.city){
    head += '<div class="metarow"><span class="updated">'
      + (state.feed ? 'Updated '+relIso(state.feed.generated_at) : '')
      + '</span><button class="refresh" onclick="loadFeed(true)">'
      + '<span '+(state.loading?'class="spin" style="display:inline-flex"':'style="display:inline-flex"')+'>'+I.refresh+'</span> Refresh</button></div>';
  }

  if(state.loading && !state.feed){ m.innerHTML = head + skeletons(); return; }
  if(state.loadError){
    m.innerHTML = head + '<div class="state"><div class="serif">Hmm.</div><p>'+esc(state.loadError)+'</p>'
      + '<button class="pill" onclick="loadFeed(true)">Try again</button></div>';
    return;
  }
  if(tab === "travel" && !state.settings.city){ m.innerHTML = head; return; }

  var stories = storiesFor(tab);
  if(!stories.length){
    m.innerHTML = head + '<div class="state"><div class="serif">Quiet in here</div>'
      + '<p>No stories in this feed right now. Feeds refresh automatically every couple of hours.</p></div>';
    return;
  }
  m.innerHTML = head + stories.map(cardHtml).join('');
}
function switchTab(t){
  state.tab = t; sset("tab", t);
  render();
  window.scrollTo({top:0});
}

/* ---------------- story sheet ---------------- */
var currentSheetId = null;
function openSheet(id){
  var st = findStory(id);
  if(!st) return;
  currentSheetId = id;
  var sv = isSaved(st);
  var why = st._why || whyFor(st, null);
  document.getElementById("layer").innerHTML =
    '<div class="overlay" onclick="closeLayer()">'
    + '<div class="sheet" onclick="event.stopPropagation()">'
    +   '<div style="position:relative">'+artHtml(st)
    +     '<button class="xbtn" onclick="closeLayer()">'+I.x+'</button></div>'
    +   '<div class="scroller">'
    +     '<div class="cmeta">'+esc(st.s)+' &middot; '+rel(st.ts)+'</div>'
    +     '<h2 class="shead serif">'+esc(st.h)+'</h2>'
    +     (st.y ? '<p class="ssum">'+esc(st.y)+'</p>' : '')
    +     '<div class="why">'+I.info+'<p><b>Why this story:</b> '+esc(why)+'</p></div>'
    +     '<a class="readbtn" href="'+esc(st.u)+'" target="_blank" rel="noopener" onclick="actRead(\''+st.id+'\')">Read at '+esc(st.s)+' '+I.ext+'</a>'
    +     '<div class="btnrow">'
    +       '<button onclick="actMore(\''+st.id+'\')">'+I.heart+' More</button>'
    +       '<button id="sheetSave" class="'+(sv?'hot':'')+'" onclick="actSave(\''+st.id+'\')">'+(sv?I.bookF:I.book)+(sv?' Saved':' Save')+'</button>'
    +       '<button onclick="actLess(\''+st.id+'\',true)">'+I.eyeoff+' Less</button>'
    +     '</div>'
    +   '</div>'
    + '</div></div>';
}
function closeLayer(){
  currentSheetId = null;
  document.getElementById("layer").innerHTML = "";
}

/* ---------------- settings ---------------- */
document.getElementById("settingsBtn").onclick = openSettings;
document.getElementById("settingsBtn").innerHTML = I.gear;
function openSettings(){
  var s = state.settings;
  document.getElementById("layer").innerHTML =
    '<div class="overlay" onclick="closeLayer()">'
    + '<div class="sheet settings" onclick="event.stopPropagation()">'
    +  '<div class="scroller">'
    +   '<div style="display:flex;justify-content:space-between;align-items:center">'
    +     '<h3>Settings</h3><button class="ibtn" onclick="closeLayer()">'+I.x+'</button></div>'
    +   '<div class="setrow"><div class="lbl"><span>Serendipity</span><span id="serVal">'+s.serendipity+'</span></div>'
    +     '<input type="range" min="0" max="100" value="'+s.serendipity+'" oninput="setSer(this.value)">'
    +     '<div class="rlbl"><span>My interests</span><span>Surprise me</span></div></div>'
    +   '<div class="setrow"><div class="lbl"><span>Theme</span></div>'
    +     '<div class="seg">'
    +       segBtn("auto","Auto")+segBtn("light","Light")+segBtn("dark","Dark")
    +     '</div></div>'
    +   '<button class="dangerbtn" onclick="resetLearning()">'+I.trash+' Reset what Meridian has learned</button>'
    +   '<p class="finenote">Feeds are gathered automatically every couple of hours from NYT, BBC, The Guardian, tech outlets, Asheville locals, and Norway/Denmark English-language sources — no API costs, ever. Hearts, saves, hides, and reads shape your For You ranking; that profile lives only on this device and fades gently over time.</p>'
    +  '</div></div></div>';
}
function segBtn(mode, label){
  var on = state.settings.themeMode === mode;
  return '<button class="'+(on?'on':'')+'" onclick="setThemeMode(\''+mode+'\')">'+label+'</button>';
}
function setThemeMode(mode){
  state.settings.themeMode = mode;
  sset("settings", state.settings);
  applyTheme();
  openSettings();
}
function setSer(v){
  state.settings.serendipity = Number(v);
  sset("settings", state.settings);
  state.scored = {};
  var el = document.getElementById("serVal");
  if(el) el.textContent = v;
}
function resetLearning(){
  state.profile = {topics:{}, lastDecay: Date.now()};
  sset("profile", state.profile);
  state.scored = {};
  toast("Learning reset — fresh start");
  closeLayer();
  render();
}

/* ---------------- boot ---------------- */
applyTheme();
render();
loadFeed(false);
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
